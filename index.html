<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Fireworks</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <style id="custom-css"></style>

        <!-- ============ HOME PAGE ============ -->
        <div id="page-home" class="page active">
            <div class="home-bg" id="homeBg"></div>
            <div class="home-content">
                <!-- Top row: Profile Card (60%) + Status+Countdown column (40%) -->
                <div class="home-top-row">
                    <!-- Profile Card -->
                    <div class="profile-card" id="profileCard">
                        <div class="profile-card-bg" id="profileCardBg"></div>
                        <div class="profile-card-body">
                            <div class="profile-avatar-wrap" id="profileAvatarWrap">
                                <div class="profile-avatar" id="profileAvatar"></div>
                            </div>
                            <div class="profile-nickname" id="profileNickname">sparkle</div>
                            <div class="profile-bio" id="profileBio"></div>
                            <div class="profile-location-weather" id="profileLocationWeather">
                                <span class="lw-part" data-field="location">Shanghai</span>
                                <span class="lw-sep"> | </span>
                                <span class="lw-part" data-field="weather">Sunny 25&deg;C</span>
                            </div>
                        </div>
                    </div>

                    <!-- Right column: Status + Countdown -->
                    <div class="home-right-col">
                        <!-- Status Section -->
                        <div class="status-section" id="statusSection">
                            <div class="status-row">
                                <div class="status-avatar" id="myStatusAvatar"></div>
                                <div class="status-info">
                                    <div class="status-name" id="myStatusName">sparkle</div>
                                    <div class="status-text" id="myStatusText">在线</div>
                                </div>
                                <div class="status-wifi" id="myWifi">
                                    <svg viewBox="0 0 20 16" width="20" height="16">
                                        <path d="M10 14.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z" fill="currentColor"/>
                                        <path d="M7.5 11.5a3.5 3.5 0 0 1 5 0" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                        <path d="M5 8.5a7 7 0 0 1 10 0" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                        <path d="M2.5 5.5a10.5 10.5 0 0 1 15 0" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                    </svg>
                                </div>
                                <div class="status-battery" id="myBattery">
                                    <svg viewBox="0 0 24 12" width="24" height="12">
                                        <rect x="0" y="0" width="22" height="12" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
                                        <rect x="2" y="2" width="0" height="8" rx="1" id="myBatteryFill" fill="var(--green)"/>
                                        <rect x="22" y="3.5" width="2" height="5" rx="1" fill="currentColor"/>
                                    </svg>
                                </div>
                            </div>
                            <div class="status-row">
                                <div class="status-avatar" id="otherStatusAvatar"></div>
                                <div class="status-info">
                                    <div class="status-name" id="otherStatusName">shimmer</div>
                                    <div class="status-text" id="otherStatusText">...</div>
                                </div>
                                <div class="status-wifi" id="otherWifi">
                                    <svg viewBox="0 0 20 16" width="20" height="16">
                                        <path d="M10 14.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z" fill="currentColor"/>
                                        <path d="M7.5 11.5a3.5 3.5 0 0 1 5 0" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                        <path d="M5 8.5a7 7 0 0 1 10 0" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                        <path d="M2.5 5.5a10.5 10.5 0 0 1 15 0" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                                    </svg>
                                </div>
                                <div class="status-battery" id="otherBattery">
                                    <svg viewBox="0 0 24 12" width="24" height="12">
                                        <rect x="0" y="0" width="22" height="12" rx="2" ry="2" fill="none" stroke="currentColor" stroke-width="1.5"/>
                                        <rect x="2" y="2" width="0" height="8" rx="1" id="otherBatteryFill" fill="var(--green)"/>
                                        <rect x="22" y="3.5" width="2" height="5" rx="1" fill="currentColor"/>
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <!-- Countdown Card -->
                        <div class="countdown-card" id="countdownCard">
                            <div class="countdown-label" id="countdownLabel">倒数日</div>
                            <div class="countdown-number" id="countdownNumber">--</div>
                            <div class="countdown-sub" id="countdownSub"></div>
                        </div>
                    </div>
                </div>

                <!-- Photo Wall + Music Player Row -->
                <div class="home-bottom-row">
                    <!-- Photo Wall -->
                    <div class="photo-wall" id="photoWall">
                        <div class="photo-wall-grid" id="photoWallGrid"></div>
                        <div class="photo-wall-add" id="photoWallAdd">
                            <label class="photo-wall-add-btn">+ 添加照片
                                <input type="file" accept="image/*" id="photoWallInput" style="display:none" multiple>
                            </label>
                        </div>
                    </div>

                    <!-- Music Player -->
                    <div class="music-player" id="musicPlayer">
                        <div class="music-disc-wrap" id="musicDiscWrap">
                            <div class="music-disc" id="musicDisc">
                                <div class="music-disc-hole"></div>
                            </div>
                        </div>
                        <div class="music-info">
                            <div class="music-title" id="musicTitle">glitter</div>
                            <div class="music-artist" id="musicArtist">弋枫</div>
                        </div>
                        <div class="music-controls">
                            <button class="music-btn" id="musicPlayBtn" title="播放/暂停">
                                <svg viewBox="0 0 24 24" width="20" height="20" id="musicPlayIcon"><path d="M8 5v14l11-7z"/></svg>
                                <svg viewBox="0 0 24 24" width="20" height="20" id="musicPauseIcon" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                            </button>
                        </div>
                        <input type="file" accept="image/*" id="discImageInput" style="display:none">
                    </div>
                </div>
            </div>
        </div>

        <!-- Navigation Bar -->
        <nav class="nav-bar" id="navBar">
            <div class="nav-item" data-page="chat" title="聊天">
                <svg viewBox="0 0 24 24" width="26" height="26"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
            </div>
            <div class="nav-item" data-page="cards" title="字卡">
                <svg viewBox="0 0 24 24" width="26" height="26"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V6h16v12z"/><path d="M6 10h2v4H6zm4 0h2v4h-2zm4 0h2v4h-2z" opacity=".5"/></svg>
            </div>
            <div class="nav-item nav-home active" data-page="home" title="主页">
                <svg viewBox="0 0 24 24" width="28" height="28"><path d="M12 3L2 12h3v8h6v-6h2v6h6v-8h3L12 3z"/></svg>
            </div>
            <div class="nav-item" data-page="stats" title="统计">
                <svg viewBox="0 0 24 24" width="26" height="26"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
            </div>
            <div class="nav-item" data-page="settings" title="设置">
                <svg viewBox="0 0 24 24" width="26" height="26"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            </div>
        </nav>

        <!-- ============ CHAT PAGE ============ -->
        <div id="page-chat" class="page">
            <div class="chat-bg" id="chatBg"></div>
            <div class="sub-header">
                <div class="back-btn" id="chatBackBtn">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </div>
                <div class="chat-peer-name" id="chatPeerName">shimmer</div>
                <div class="chat-settings-btn" id="chatSettingsBtn">
                    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="chat-empty-hint" id="chatEmptyHint">
                    <div class="chat-empty-icon">&#x1F4AC;</div>
                    <p>发送一条消息开始聊天</p>
                    <p class="sub-hint">对方会从字卡库中随机抽取卡片回复你</p>
                </div>
            </div>
            <!-- Scroll to bottom button -->
            <div class="scroll-bottom-btn" id="scrollBottomBtn" style="display:none">
                <svg viewBox="0 0 24 24" width="24" height="24"><path d="M12 4l-8 8h6v8h4v-8h6z" fill="currentColor"/></svg>
            </div>
            <div class="chat-input-bar">
                <button class="chat-plus-btn" id="chatPlusBtn" title="更多功能">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </button>
                <input type="text" class="chat-input" id="chatInput" placeholder="输入消息..." maxlength="500">
                <button class="chat-play-btn" id="chatPlayBtn" title="让对方继续说">
                    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button class="chat-send-btn" id="chatSendBtn">
                    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
            <!-- Chat drawer overlay -->
            <div class="chat-drawer-overlay" id="chatDrawerOverlay" style="display:none"></div>
            <div class="chat-drawer" id="chatDrawer">
                <div class="chat-drawer-header">
                    <span>更多功能</span>
                    <button class="chat-drawer-close" id="chatDrawerClose">&times;</button>
                </div>
                <div class="chat-drawer-body">
                    <div class="drawer-icon-grid">
                        <div class="drawer-icon-item" id="drawerMultiMsgIcon">
                            <div class="drawer-icon">📨</div>
                            <div class="drawer-icon-label">发送多消息</div>
                        </div>
                        <div class="drawer-icon-item" id="drawerCallIcon">
                            <div class="drawer-icon">📞</div>
                            <div class="drawer-icon-label">通话</div>
                        </div>
                        <div class="drawer-icon-item" id="drawerTransferIcon">
                            <div class="drawer-icon">🧧</div>
                            <div class="drawer-icon-label">红包</div>
                        </div>
                        <div class="drawer-icon-item" id="drawerGiftIcon">
                            <div class="drawer-icon">🎁</div>
                            <div class="drawer-icon-label">送礼</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ============ CHAT SETTINGS PAGE ============ -->
        <div id="page-chatsettings" class="page">
            <div class="sub-header">
                <div class="back-btn" id="chatSettingsBackBtn">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </div>
                <div class="sub-header-title">聊天调整</div>
                <div style="width:24px"></div>
            </div>
            <div class="settings-container" id="chatSettingsContainer"></div>
        </div>

        <!-- ============ CARDS PAGE ============ -->
        <div id="page-cards" class="page">
            <div class="sub-header">
                <div class="back-btn" id="cardsBackBtn">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </div>
                <div class="sub-header-title">字卡库</div>
                <div class="cards-toolbar">
                    <button class="icon-btn" id="cardAddBtn" title="添加字卡">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                    </button>
                    <button class="icon-btn" id="cardMultiBtn" title="多选">
                        <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M9 12l2 2 4-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
                    </button>
                    <button class="icon-btn" id="cardImportBtn" title="导入">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                    </button>
                    <button class="icon-btn" id="cardExportBtn" title="导出">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" transform="rotate(180 12 12)"/></svg>
                    </button>
                </div>
            </div>
            <!-- Cards tab bar -->
            <div class="cards-tab-bar" id="cardsTabBar">
                <div class="cards-tab active" data-card-tab="main">主字卡</div>
                <div class="cards-tab" data-card-tab="status">对方状态</div>
                <div class="cards-tab" data-card-tab="emoji">Emoji</div>
                <div class="cards-tab" data-card-tab="gift">礼物</div>
            </div>
            <div class="cards-group-bar" id="cardsGroupBar"></div>
            <div class="cards-list" id="cardsList"></div>
            <!-- Add card modal -->
            <div class="modal-overlay" id="addCardModal" style="display:none">
                <div class="modal">
                    <div class="modal-header">添加字卡</div>
                    <textarea class="add-card-textarea" id="addCardTextarea" placeholder="每行一条字卡&#10;用 {{翻译内容}} 添加翻译&#10;例如：你好 {{Hello}}"></textarea>
                    <div class="add-card-group-select" id="addCardGroupRow">
                        <label>分组：</label>
                        <div class="beautified-select-wrap">
                            <select id="addCardGroupSelect"></select>
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button class="btn-secondary" id="addCardCancel">取消</button>
                        <button class="btn-primary" id="addCardConfirm">添加</button>
                    </div>
                </div>
            </div>
            <!-- Edit card modal -->
            <div class="modal-overlay" id="editCardModal" style="display:none">
                <div class="modal">
                    <div class="modal-header">修改字卡</div>
                    <input type="text" class="edit-card-input" id="editCardContent" placeholder="字卡内容">
                    <input type="text" class="edit-card-input" id="editCardTranslation" placeholder="翻译（可选）">
                    <!-- Gift card fields (hidden by default) -->
                    <input type="text" class="edit-card-input" id="editCardGiftEmoji" placeholder="礼物 Emoji" style="display:none">
                    <input type="text" class="edit-card-input" id="editCardGiftDesc" placeholder="礼物描述" style="display:none">
                    <div class="add-card-group-select" id="editCardGroupRow">
                        <label>分组：</label>
                        <div class="beautified-select-wrap">
                            <select id="editCardGroupSelect"></select>
                        </div>
                    </div>
                    <div class="modal-actions">
                        <button class="btn-secondary" id="editCardCancel">取消</button>
                        <button class="btn-primary" id="editCardConfirm">保存</button>
                    </div>
                </div>
            </div>
            <!-- Group edit modal -->
            <div class="modal-overlay" id="groupModal" style="display:none">
                <div class="modal">
                    <div class="modal-header">管理分组</div>
                    <div class="group-list-edit" id="groupListEdit"></div>
                    <div class="group-add-row">
                        <input type="text" id="newGroupName" placeholder="新分组名称">
                        <button class="btn-primary btn-sm" id="addGroupBtn">添加</button>
                    </div>
                    <div class="modal-actions">
                        <button class="btn-secondary" id="groupModalClose">关闭</button>
                    </div>
                </div>
            </div>
            <!-- Multi-select bar -->
            <div class="multi-select-bar" id="multiSelectBar" style="display:none">
                <button class="btn-secondary btn-sm" id="multiSelectCancel">取消</button>
                <span id="multiSelectCount">已选 0 项</span>
                <button class="btn-danger btn-sm" id="multiSelectDelete">删除选中</button>
                <button class="btn-secondary btn-sm" id="multiSelectBlock">屏蔽选中</button>
            </div>
            <input type="file" id="cardFileInput" accept=".txt" style="display:none">
        </div>

        <!-- ============ STATS PAGE ============ -->
        <div id="page-stats" class="page">
            <div class="sub-header">
                <div class="back-btn" id="statsBackBtn">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </div>
                <div class="sub-header-title">数据统计</div>
                <div style="width:24px"></div>
            </div>
            <div class="stats-container" id="statsContainer"></div>
        </div>

        <!-- ============ SETTINGS PAGE ============ -->
        <div id="page-settings" class="page">
            <div class="sub-header">
                <div class="back-btn" id="settingsBackBtn">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                </div>
                <div class="sub-header-title">设置</div>
                <div style="width:24px"></div>
            </div>
            <div class="settings-tabs">
                <div class="settings-tab active" data-tab="appearance">外观</div>
                <div class="settings-tab" data-tab="text">文字</div>
                <div class="settings-tab" data-tab="data">数据</div>
                <div class="settings-tab" data-tab="sound">声音</div>
                <div class="settings-tab" data-tab="notification">通知</div>
            </div>
            <div class="settings-container" id="settingsContainer"></div>
        </div>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <!-- Call floating ball (draggable) -->
    <div class="call-float" id="callFloat" style="display:none">
        <div class="call-float-ball" id="callFloatBall">
            <span id="callFloatIcon">📞</span>
        </div>
        <div class="call-float-timer" id="callFloatTimer">00:00</div>
    </div>
    <!-- Video / Voice call fullscreen overlay -->
    <div class="call-fullscreen" id="callFullscreen" style="display:none">
        <div class="call-full-bg" id="callFullBg"></div>
        <div class="call-full-content">
            <div class="call-full-top">
                <button class="call-minimize-btn" id="callMinimizeBtn" title="缩小">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
                </button>
            </div>
            <div class="call-full-header">
                <span id="callFullPeer">shimmer</span>
                <span class="call-full-type" id="callFullType">呼叫中...</span>
            </div>
            <div class="call-full-avatar-wrap">
                <div class="call-full-avatar" id="callFullAvatar"></div>
                <div class="call-ripple" id="callRipple"></div>
            </div>
            <div class="call-full-timer" id="callFullTimer" style="display:none">00:00</div>
            <div class="call-full-actions" id="callActionsOutgoing">
                <button class="call-action-btn call-mic-btn" id="callMicBtn" title="麦克风">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </button>
                <button class="call-action-btn call-end" id="callEndBtn" title="挂断">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </button>
                <button class="call-action-btn call-camera-btn" id="callCameraBtn" title="摄像头">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                </button>
            </div>
            <div class="call-full-actions" id="callActionsIncoming" style="display:none">
                <button class="call-action-btn call-end" id="callRejectBtn" title="拒绝">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </button>
                <button class="call-action-btn call-accept-btn" id="callAcceptBtn" title="接听">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" transform="scale(-1,1) translate(-24,0)"/></svg>
                </button>
            </div>
        </div>
