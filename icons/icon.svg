<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5865f2" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#5865f2" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="#202225"/>
  <circle cx="256" cy="256" r="130" fill="url(#glow)"/>
  <g transform="translate(256, 256)" fill="none" stroke="#ffffff" stroke-linecap="round">
    <!-- Center dot -->
    <circle r="8" fill="#ffffff" stroke="none" opacity="0.95"/>
    <!-- Main rays (8 directions) -->
    <g stroke-width="4.5">
      <line x1="0" y1="-20" x2="0" y2="-100"/>
      <line x1="0" y1="20" x2="0" y2="100"/>
      <line x1="-20" y1="0" x2="-100" y2="0"/>
      <line x1="20" y1="0" x2="100" y2="0"/>
      <line x1="-14" y1="-14" x2="-71" y2="-71"/>
      <line x1="14" y1="-14" x2="71" y2="-71"/>
      <line x1="-14" y1="14" x2="-71" y2="71"/>
      <line x1="14" y1="14" x2="71" y2="71"/>
    </g>
    <!-- Secondary rays (shorter, thinner) -->
    <g stroke-width="3" opacity="0.5">
      <line x1="-8" y1="-19" x2="-38" y2="-91"/>
      <line x1="8" y1="-19" x2="38" y2="-91"/>
      <line x1="-8" y1="19" x2="-38" y2="91"/>
      <line x1="8" y1="19" x2="38" y2="91"/>
      <line x1="-19" y1="-8" x2="-91" y2="-38"/>
      <line x1="-19" y1="8" x2="-91" y2="38"/>
      <line x1="19" y1="-8" x2="91" y2="-38"/>
      <line x1="19" y1="8" x2="91" y2="38"/>
    </g>
  </g>
  <!-- Dot tips -->
  <g fill="#ffffff">
    <circle cx="256" cy="156" r="6"/>
    <circle cx="256" cy="356" r="6"/>
    <circle cx="156" cy="256" r="6"/>
    <circle cx="356" cy="256" r="6"/>
    <circle cx="185" cy="185" r="5"/>
    <circle cx="327" cy="185" r="5"/>
    <circle cx="185" cy="327" r="5"/>
    <circle cx="327" cy="327" r="5"/>
  </g>
</svg>
